name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run type check
        run: npm run build

      - name: Run tests
        run: npm test

  publish:
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Only trigger on release event, not on push to main
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          scope: '@jessenguyen22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          # Create .npmrc with auth token for scoped package
          mkdir -p ~/.npm
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

          # Check if version already exists on registry
          VERSION_TAG="${{ github.event.release.tag_name }}"
          echo "Checking if version ${VERSION_TAG} exists on npm..."

          if npm view @jessenguyen22/pi-tool-router@${VERSION_TAG} 1>/dev/null 2>&1; then
            echo "✅ Version ${VERSION_TAG} already published on npm - skipping publish step."
            exit 0
          fi

          echo "📦 Version ${VERSION_TAG} not found - publishing to npm..."
          npm publish --access public
