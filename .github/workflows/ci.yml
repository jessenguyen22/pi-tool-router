name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run type check
        run: npm run build

      - name: Run tests
        run: npm test

  publish:
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Only trigger on release event, not on push to main
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          scope: '@jessenguyen22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          # Create .npmrc with auth token for scoped package
          mkdir -p ~/.npm
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

          # Use npm view exit code properly - 0 means exists, non-0 means doesn't exist
          if npm view @jessenguyen22/pi-tool-router@${{ github.event.release.tag_name }} 1>/dev/null 2>&1; then
            echo "Version ${{ github.event.release.tag_name }} already published, skipping..."
            exit 0
          fi

          echo "Publishing version ${{ github.event.release.tag_name }}..."
          npm publish --access public
