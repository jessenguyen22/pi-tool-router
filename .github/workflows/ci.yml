name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run type check
        run: npm run build

      - name: Run tests
        run: npm test

  publish:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Create .npmrc with auth token (GitHub Actions secrets format)
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

          # Debug: show what's in .npmrc (masked)
          echo "=== .npmrc (masked) ==="
          cat ~/.npmrc | sed 's/_authToken=.*/_authToken=***/g'
          echo "========================"

          VERSION_TAG="${GITHUB_REF#refs/tags/}"
          echo "Attempting to publish version: ${VERSION_TAG}"

          # Attempt to publish - if version exists, npm will fail with 403
          # We catch 403 and treat it as success since version already exists
          npm publish --access public || {
            EXIT_CODE=$?
            echo "npm publish exited with code: $EXIT_CODE"
            
            # Check ALL npm logs for 403 (already published) vs other errors
            if grep -rE "403 Forbidden|cannot publish over the previously published" /home/runner/.npm/_logs/ 2>/dev/null; then
              echo "✅ Version ${VERSION_TAG} already exists on npm (403 = expected)"
              exit 0
            fi
            
            echo "❌ Unexpected publish error"
            exit $EXIT_CODE
          }
